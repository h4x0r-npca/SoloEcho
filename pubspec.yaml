name: soloecho
description: A private Google Drive-backed solo SNS timeline.
publish_to: 'none'
version: 0.2.1+3

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  google_sign_in: ^6.2.2
  googleapis: ^16.0.0
  http: ^1.2.2
  intl: ^0.20.2
  oauth2: ^2.0.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/solo_echo_logo_transparent.png
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard/Pretendard-Bold.otf
          weight: 700
